<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- 아동 친화적이고 직관적인 AR 보물상자 및 카메라 렌즈 디자인 파비콘 -->
  <defs>
    <!-- 배경 원형 그라데이션 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- 금빛 보물상자 그라데이션 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- 보석 그라데이션 (에메랄드/루비색) -->
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- AR 렌즈 리플렉션 반사 효과 그라데이션 -->
    <linearGradient id="lensReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- 테두리가 둥근 세련된 다크 블루 배경 -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#334155" stroke-width="8" />

  <!-- 1. AR 카메라 조준 가이드라인 (모서리 격자 형태) -->
  <g stroke="#38bdf8" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.85">
    <!-- 좌상단 가이드 -->
    <path d="M 96,160 L 96,96 L 160,96" />
    <!-- 우상단 가이드 -->
    <path d="M 352,96 L 416,96 L 416,160" />
    <!-- 좌하단 가이드 -->
    <path d="M 96,352 L 96,416 L 160,416" />
    <!-- 우하단 가이드 -->
    <path d="M 352,416 L 416,416 L 416,352" />
  </g>

  <!-- 2. 중앙의 반짝이는 보물상자 캐릭터/아이콘 -->
  <g transform="translate(116, 126)">
    <!-- 상자 몸체 (아랫부분) -->
    <rect x="20" y="110" width="240" height="130" rx="20" fill="url(#goldGrad)" stroke="#78350f" stroke-width="12" />
    
    <!-- 상자 덮개 (윗부분) -->
    <path d="M 10,95 C 10,40 270,40 270,95 Z" fill="url(#goldGrad)" stroke="#78350f" stroke-width="12" stroke-linejoin="round" />
    
    <!-- 덮개 중앙의 나무 무늬 띠 -->
    <path d="M 115,45 C 115,45 140,38 165,45 L 165,95 L 115,95 Z" fill="#b45309" opacity="0.35" />

    <!-- 상자 전면 띠 장식 -->
    <rect x="120" y="110" width="40" height="130" fill="#d97706" />

    <!-- 보물상자 열쇠구멍 금속 장식 -->
    <rect x="110" y="85" width="60" height="60" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="8" />
    <!-- 열쇠 구멍 -->
    <path d="M 140,100 C 134,100 130,104 130,110 C 130,115 133,118 136,120 L 134,132 L 146,132 L 144,120 C 147,118 150,115 150,110 C 150,104 146,100 140,100 Z" fill="#0f172a" />

    <!-- 좌우 반짝이 별 이펙트 -->
    <path d="M -15,50 L -5,60 L -15,70 L -25,60 Z" fill="#fbbf24" />
    <path d="M 295,140 L 305,150 L 295,160 L 285,150 Z" fill="#fbbf24" />
  </g>

  <!-- 3. 전면에 겹쳐지는 투명한 AR 카메라 렌즈 오버레이 (반짝임 반사광 효과) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#38bdf8" stroke-width="16" opacity="0.9" />
  <!-- 렌즈 글래스 반사광 (대각선 필터) -->
  <path d="M 120,120 C 200,80 320,80 400,160 C 340,240 240,340 120,120 Z" fill="url(#lensReflect)" pointer-events="none" />
  <!-- 렌즈 주변 조준용 작은 원형 점선 조각 -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#60a5fa" stroke-width="6" stroke-dasharray="16 24" opacity="0.6" />
</svg>